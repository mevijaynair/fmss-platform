<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>FMSS Admin</title>
  <style>
    :root {
      --bg: #0A0A0A; --panel: #141414; --gold: #FFD700; --text: #fff;
      --muted: #999; --border: rgba(255,215,0,0.2); --danger: #ff5468;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0A0A0A, #050505);
      color: var(--text); min-height: 100vh; padding: 1.5rem;
    }
    a { color: var(--gold); }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { color: var(--gold); font-size: 1.6rem; letter-spacing: 2px; }
    .sub { color: var(--muted); font-size: .85rem; margin-bottom: 1.5rem; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem;
    }
    label { display: block; font-size: .8rem; color: var(--muted); margin: .75rem 0 .3rem; text-transform: uppercase; letter-spacing: 1px; }
    input, textarea {
      width: 100%; padding: .7rem .9rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0d0d0d; color: var(--text); font-size: .95rem;
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      background: var(--gold); color: #000; border: none; border-radius: 8px;
      padding: .7rem 1.3rem; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button.ghost { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    button.danger { background: transparent; color: var(--danger); border: 1px solid rgba(255,84,104,.4); }
    .row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; }
    .grow { flex: 1; }
    .hidden { display: none !important; }
    .msg { padding: .6rem .9rem; border-radius: 8px; font-size: .85rem; margin: .75rem 0; }
    .msg.err { background: rgba(255,84,104,.12); color: var(--danger); }
    .msg.ok { background: rgba(255,215,0,.12); color: var(--gold); }
    .news-item {
      border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
      margin-bottom: .75rem; display: flex; gap: 1rem; align-items: flex-start;
    }
    .news-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; }
    .news-item .t { font-weight: 700; }
    .news-item .d { color: var(--muted); font-size: .8rem; }
    .badge-pill { font-size: .7rem; color: #000; background: var(--gold); border-radius: 20px; padding: .1rem .6rem; }
    .draft { opacity: .55; }
    .thumb-preview { max-width: 160px; border-radius: 8px; margin-top: .5rem; display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN -->
    <div id="loginView" class="hidden">
      <h1>FMSS Admin</h1>
      <p class="sub">Restricted area — authorised brothers only.</p>
      <div class="card">
        <form id="loginForm">
          <label for="pw">Password</label>
          <input type="password" id="pw" autocomplete="current-password" required>
          <div id="loginMsg"></div>
          <div style="margin-top:1rem"><button type="submit">Sign in</button></div>
        </form>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashView" class="hidden">
      <div class="topbar">
        <div><h1>FMSS News</h1><p class="sub" style="margin:0">Manage what shows on the website.</p></div>
        <button class="ghost" id="logoutBtn">Log out</button>
      </div>

      <div class="card">
        <strong id="formTitle">Add news</strong>
        <form id="newsForm">
          <input type="hidden" id="newsId">
          <label for="title">Title</label>
          <input type="text" id="title" required maxlength="200">

          <label for="body">Story</label>
          <textarea id="body" maxlength="4000"></textarea>

          <div class="row">
            <div class="grow">
              <label for="date">Date</label>
              <input type="date" id="date">
            </div>
            <div class="grow">
              <label for="badge">Badge (optional)</label>
              <input type="text" id="badge" maxlength="60" placeholder="e.g. Official Sponsor">
            </div>
          </div>

          <label for="file">Photo (upload an image)</label>
          <input type="file" id="file" accept="image/*">
          <input type="hidden" id="image">
          <img id="thumb" class="thumb-preview" alt="preview">

          <div class="row">
            <div class="grow">
              <label for="instagram">Instagram link (optional)</label>
              <input type="url" id="instagram" placeholder="https://instagram.com/p/...">
            </div>
            <div class="grow">
              <label for="facebook">Facebook link (optional)</label>
              <input type="url" id="facebook" placeholder="https://facebook.com/...">
            </div>
          </div>

          <label class="row" style="text-transform:none;color:var(--text);margin-top:1rem">
            <input type="checkbox" id="published" checked style="width:auto"> Published (visible on site)
          </label>

          <div id="formMsg"></div>
          <div class="row" style="margin-top:1rem">
            <button type="submit" id="saveBtn">Save news</button>
            <button type="button" class="ghost hidden" id="cancelBtn">Cancel edit</button>
          </div>
        </form>
      </div>

      <div class="card">
        <strong>Posted news</strong>
        <div id="newsList" style="margin-top:1rem"></div>
      </div>
    </div>
  </div>

  <script>
    const H = { 'x-fmss-admin': '1' };
    const adminBase = location.pathname.replace(/\/$/, '');
    const $ = id => document.getElementById(id);
    const show = (el, on) => el.classList.toggle('hidden', !on);
    const esc = s => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };

    async function api(url, opts = {}) {
      const res = await fetch(url, { credentials: 'same-origin', headers: { ...H, ...(opts.headers || {}) }, ...opts });
      return res;
    }

    // ---- session bootstrap ----
    async function boot() {
      const s = await (await api('/api/admin/session')).json();
      if (!s.configured) { $('loginMsg').innerHTML = '<div class="msg err">Admin password not set on the server yet.</div>'; }
      if (s.authed) { show($('dashView'), true); show($('loginView'), false); loadNews(); }
      else { show($('loginView'), true); show($('dashView'), false); }
    }

    // ---- login ----
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('loginMsg').innerHTML = '';
      const res = await api(adminBase + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: $('pw').value }),
      });
      if (res.ok) { $('pw').value = ''; boot(); }
      else { const e2 = await res.json().catch(() => ({})); $('loginMsg').innerHTML = `<div class="msg err">${esc(e2.error || 'Login failed')}</div>`; }
    });

    $('logoutBtn').addEventListener('click', async () => { await api(adminBase + '/logout', { method: 'POST' }); boot(); });

    // ---- image upload ----
    $('file').addEventListener('change', async () => {
      const f = $('file').files[0]; if (!f) return;
      const fd = new FormData(); fd.append('image', f);
      $('formMsg').innerHTML = '<div class="msg ok">Uploading image…</div>';
      const res = await api('/api/admin/upload', { method: 'POST', body: fd });
      const data = await res.json().catch(() => ({}));
      if (res.ok) { $('image').value = data.url; $('thumb').src = data.url; $('thumb').style.display = 'block'; $('formMsg').innerHTML = '<div class="msg ok">Image ready.</div>'; }
      else { $('formMsg').innerHTML = `<div class="msg err">${esc(data.error || 'Upload failed')}</div>`; }
    });

    // ---- save (create or update) ----
    $('newsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = $('newsId').value;
      const payload = {
        title: $('title').value, body: $('body').value, date: $('date').value,
        badge: $('badge').value, image: $('image').value,
        instagram: $('instagram').value, facebook: $('facebook').value,
        published: $('published').checked,
      };
      const res = await api(id ? `/api/admin/news/${id}` : '/api/admin/news', {
        method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      if (res.ok) { resetForm(); loadNews(); $('formMsg').innerHTML = '<div class="msg ok">Saved.</div>'; }
      else { const e2 = await res.json().catch(() => ({})); $('formMsg').innerHTML = `<div class="msg err">${esc(e2.error || 'Save failed')}</div>`; }
    });

    $('cancelBtn').addEventListener('click', resetForm);
    function resetForm() {
      $('newsForm').reset(); $('newsId').value = ''; $('image').value = '';
      $('thumb').style.display = 'none'; $('formTitle').textContent = 'Add news';
      show($('cancelBtn'), false); $('published').checked = true;
    }

    // ---- list ----
    async function loadNews() {
      const items = await (await api('/api/admin/news')).json();
      const list = $('newsList');
      if (!items.length) { list.innerHTML = '<p style="color:var(--muted)">No news yet.</p>'; return; }
      list.innerHTML = items.map(n => `
        <div class="news-item ${n.published ? '' : 'draft'}">
          ${n.image ? `<img src="${esc(n.image)}" alt="">` : ''}
          <div class="grow">
            <div class="t">${esc(n.title)} ${n.badge ? `<span class="badge-pill">${esc(n.badge)}</span>` : ''} ${n.published ? '' : '· (draft)'}</div>
            <div class="d">${esc(n.date)}</div>
          </div>
          <div class="row">
            <button class="ghost" data-edit="${n.id}">Edit</button>
            <button class="danger" data-del="${n.id}">Delete</button>
          </div>
        </div>`).join('');
      list.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => editItem(items.find(n => n.id === b.dataset.edit)));
      list.querySelectorAll('[data-del]').forEach(b => b.onclick = () => delItem(b.dataset.del));
    }

    function editItem(n) {
      $('newsId').value = n.id; $('title').value = n.title || ''; $('body').value = n.body || '';
      $('date').value = (n.date || '').slice(0, 10); $('badge').value = n.badge || '';
      $('image').value = n.image || ''; $('instagram').value = n.instagram || ''; $('facebook').value = n.facebook || '';
      $('published').checked = n.published !== false;
      if (n.image) { $('thumb').src = n.image; $('thumb').style.display = 'block'; } else { $('thumb').style.display = 'none'; }
      $('formTitle').textContent = 'Edit news'; show($('cancelBtn'), true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function delItem(id) {
      if (!confirm('Delete this news item?')) return;
      const res = await api(`/api/admin/news/${id}`, { method: 'DELETE' });
      if (res.ok) loadNews();
    }

    boot();
  </script>
</body>
</html>
