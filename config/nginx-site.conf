# Nginx site configuration for fmss.ae
# Place in: /etc/nginx/sites-available/fmss

upstream main_app {
    server 127.0.0.1:8000;
}

upstream sams_app {
    server 127.0.0.1:3000;
}

upstream contracts_app {
    server 127.0.0.1:3100;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name fmss.ae www.fmss.ae sams.fmss.ae contracts.fmss.ae quiz.fmss.ae;
    return 301 https://$server_name$request_uri;
}

# Main domain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fmss.ae www.fmss.ae;

    ssl_certificate /etc/letsencrypt/live/fmss.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fmss.ae/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/fmss_access.log;
    error_log /var/log/nginx/fmss_error.log;

    location / {
        proxy_pass http://main_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

